name: Auto Merge PRs

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge all mergeable PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            async function getMergeableStatus(github, context, pull_number, maxRetries = 5) {
              for (let i = 0; i < maxRetries; i++) {
                const { data: detail } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number,
                });

                if (detail.mergeable !== null) {
                  return detail;
                }

                console.log(`PR #${pull_number} mergeable is null, retrying in 3s... (${i + 1}/${maxRetries})`);
                await new Promise(resolve => setTimeout(resolve, 3000));
              }
              return null;
            }

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            for (const pr of prs) {
              const detail = await getMergeableStatus(github, context, pr.number);

              if (!detail) {
                console.log(`Skipping PR #${pr.number}: could not determine mergeable status after retries`);
                continue;
              }

              if (detail.mergeable === true && detail.mergeable_state === 'clean') {
                console.log(`Merging PR #${pr.number}: ${pr.title}`);
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                });
              } else {
                console.log(`Skipping PR #${pr.number}: mergeable=${detail.mergeable}, state=${detail.mergeable_state}`);
              }
            }