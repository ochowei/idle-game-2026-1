# .github/workflows/auto-merge.yml
name: Auto Merge PRs

on:
  schedule:
    - cron: '*/10 * * * *'  # 每 10 分鐘
  workflow_dispatch:         # 允許手動觸發

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge all mergeable PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            for (const pr of prs) {
              // 取得詳細資訊以確認 mergeable 狀態
              const { data: detail } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              if (detail.mergeable === true && detail.mergeable_state === 'clean') {
                console.log(`Merging PR #${pr.number}: ${pr.title}`);
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash', // 或 'merge' / 'rebase'
                });
              } else {
                console.log(`Skipping PR #${pr.number}: mergeable=${detail.mergeable}, state=${detail.mergeable_state}`);
              }
            }